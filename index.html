<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ma Collection Interactive</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        
        @media print {
            .header-container, .print-btn { display: none !important; }
            body { background: white; padding: 0; }
            .card { break-inside: avoid; border: 1px solid #ccc !important; }
            .card-inner { transform: none !important; transition: none !important; }
            .card-back { display: none !important; }
        }

        .header-container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 30px; position: sticky; top: 10px; z-index: 1000; text-align: center; }
        .stats { font-size: 0.9em; color: #666; margin-bottom: 15px; }
        .controls { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; align-items: center; }
        
        input, select, .print-btn { padding: 10px; border: 2px solid #ddd; border-radius: 8px; font-size: 14px; }
        .print-btn { background: #27ae60; color: white; cursor: pointer; border: none; font-weight: bold; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; }
        .card { background: transparent; width: 200px; height: 280px; perspective: 1000px; }
        .card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card:hover .card-inner { transform: rotateY(180deg); }
        
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: flex; flex-direction: column; background: white; overflow: hidden; border: 1px solid #eee; }
        
        .img-container { height: 160px; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        /* Style Verso */
        .card-back { transform: rotateY(180deg); background: #2c3e50; color: white; padding: 10px; box-sizing: border-box; }
        .back-title { font-weight: bold; font-size: 1em; margin-bottom: 10px; border-bottom: 1px solid #7f8c8d; padding-bottom: 5px; }
        .skirt-content { font-size: 0.8em; overflow-y: auto; flex-grow: 1; display: flex; flex-direction: column; gap: 8px; justify-content: center; }
        .skirt-img { max-width: 100%; border-radius: 5px; border: 1px solid #fff; }

        .footer { background: #f8f9fa; padding: 8px; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid #eee; }
        .logo-small { width: 30px; height: 30px; object-fit: contain; }
    </style>
</head>
<body>
    <div class="header-container">
        <h1>Ma Collection de Capsules</h1>
        <div class="stats">📊 <strong>1257</strong> capsules | 🌍 <strong>44</strong> pays</div>
        
        <div class="controls">
            <input type="text" id="searchInput" onkeyup="filterAndSort()" placeholder="Rechercher un ID...">
            
            <select id="filterCountry" onchange="filterAndSort()">
                <option value="">Tous les pays</option>
            </select>

            <select id="sortOrder" onchange="filterAndSort()">
                <option value="id">Trier par ID</option>
                <option value="country">Trier par Pays</option>
            </select>

            <button class="print-btn" onclick="window.print()">🖨️ Imprimer la liste</button>
        </div>
    </div>

    <div class="grid" id="capsuleGrid">
    <script>
// 1. CHARGEMENT DU CSV
async function loadCapsules() {
    try {
        const response = await fetch('capsules_local.csv'); // <-- Vérifie bien le nom exact ici
        const data = await response.text();
        const capsules = parseCSV(data);
        renderGrid(capsules);
        generateCountryMenu();
        filterAndSort();
    } catch (error) {
        console.error("Erreur de chargement :", error);
    }
}

// 2. PARSEUR CSV ROBUSTE (Gère les guillemets et virgules)
function parseCSV(text) {
    const lines = text.split(/\r?\n/);
    const result = [];
    
    // On commence à i = 1 pour sauter la ligne d'entête (id, country...)
    for (let i = 1; i < lines.length; i++) {
        let line = lines[i].trim();
        if (!line) continue;

        // Regex pour couper par virgule SANS couper ce qui est entre guillemets
        const matches = line.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
        
        if (matches && matches.length >= 2) {
            const clean = m => m.replace(/^"|"$/g, '').trim();
            result.push({
                id: clean(matches[0]),
                country: clean(matches[1]),
                img: clean(matches[2] || ""),
                logo: clean(matches[3] || ""),
                skirt: clean(matches[4] || ""),
                page: clean(matches[5] || "?")
            });
        }
    }
    return result;
}

// 3. GÉNÉRATION DU HTML
function renderGrid(capsules) {
    const grid = document.getElementById('capsuleGrid');
    if (!grid) return;
    
    grid.innerHTML = capsules.map(cap => `
        <div class="card" data-id="${cap.id}" data-country="${cap.country}">
            <div class="card-inner">
                <div class="card-front">
                    <div class="img-container">
                        <img src="${cap.img}" loading="lazy" onerror="this.src='https://via.placeholder.com/150?text=No+Image'">
                    </div>
                    <div class="content">
                        <div style="font-weight:bold; color:#3498db;">#${cap.id}</div>
                        <div style="font-size:0.9em; margin-top:5px;">${cap.country}</div>
                    </div>
                    <div class="footer">
                        <img src="${cap.logo}" class="logo-small" onerror="this.style.opacity='0'">
                        <span style="font-size:0.75em; color:#7f8c8d;">Page ${cap.page}</span>
                    </div>
                </div>
                <div class="card-back">
                    <div class="back-title">DÉTAILS #${cap.id}</div>
                    <div class="skirt-content"><div>${cap.skirt || 'Pas de texte'}</div></div>
                    <div style="margin-top:auto; font-size:0.65em; opacity:0.6;">Survolez pour retourner</div>
                </div>
            </div>
        </div>
    `).join('');
}

// 4. MENU DÉROULANT ET STATS
function generateCountryMenu() {
    const grid = document.getElementById('capsuleGrid');
    const cards = Array.from(grid.getElementsByClassName('card'));
    const select = document.getElementById('filterCountry');
    const statsContainer = document.querySelector('.stats');
    
    let countryCounts = {};
    cards.forEach(card => {
        let c = card.getAttribute('data-country');
        if (c) countryCounts[c] = (countryCounts[c] || 0) + 1;
    });

    let countries = Object.keys(countryCounts).sort((a, b) => a.localeCompare(b, 'fr', { sensitivity: 'base' }));

    if (statsContainer) {
        statsContainer.innerHTML = `📊 <strong>${cards.length}</strong> capsules | 🌍 <strong>${countries.length}</strong> pays`;
    }

    if (select) {
        select.innerHTML = '<option value="">Tous les pays</option>';
        countries.forEach(country => {
            let option = document.createElement('option');
            option.value = country;
            option.textContent = `${country} (${countryCounts[country]})`;
            select.appendChild(option);
        });
    }
}

// 5. FILTRE ET TRI
function filterAndSort() {
    const input = document.getElementById('searchInput').value.toLowerCase();
    const countryFilter = document.getElementById('filterCountry').value;
    const sortOrder = document.getElementById('sortOrder').value;
    const grid = document.getElementById('capsuleGrid');
    const cards = Array.from(grid.getElementsByClassName('card'));

    cards.forEach(card => {
        const id = card.getAttribute('data-id').toLowerCase();
        const country = card.getAttribute('data-country');
        const matchesSearch = id.includes(input);
        const matchesCountry = !countryFilter || country === countryFilter;
        card.style.display = (matchesSearch && matchesCountry) ? "" : "none";
    });

    cards.sort((a, b) => {
        if (sortOrder === 'id') {
            return (parseInt(a.getAttribute('data-id')) || 0) - (parseInt(b.getAttribute('data-id')) || 0);
        }
        return a.getAttribute('data-country').localeCompare(b.getAttribute('data-country'), 'fr');
    });

    cards.forEach(card => grid.appendChild(card));
}

// LANCEMENT
window.onload = loadCapsules;
</script>
