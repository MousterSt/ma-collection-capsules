<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ma Collection de Capsules</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; text-align: center; }
        .controls { background: white; padding: 20px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .card { background: white; border-radius: 10px; padding: 15px; width: 200px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .cap-img { width: 150px; height: 150px; object-fit: contain; border-radius: 50%; }
        .logo-img { width: 80px; height: 50px; object-fit: contain; margin-top: 10px; display: block; margin-left: auto; margin-right: auto; }
        .info { font-size: 0.9em; color: #555; margin-top: 10px; }
        .skirt { font-style: italic; color: #888; font-size: 0.8em; }
        select, input { padding: 8px; margin: 5px; border-radius: 5px; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <div class="controls">
        <h1>Ma Collection de Capsules</h1>
        <input type="text" id="searchInput" placeholder="Rechercher une capsule..." onkeyup="filterData()">
        
        <label for="countrySelect">Filtrer par Pays :</label>
        <select id="countrySelect" onchange="filterData()">
            <option value="">Tous les pays</option>
        </select>
    </div>

    <div class="grid" id="capsuleGrid">
        </div>

    <script>
        let allCapsules = [];

        // 1. Charger le fichier CSV
        fetch('capsules_local.csv')
            .then(response => response.text())
            .then(data => {
                const rows = data.split('\n').slice(1); // On saute l'en-tête
                allCapsules = rows.filter(row => row.trim() !== '').map(row => {
                    const cols = row.split(',');
                    return {
                        id: cols[0],
                        country: cols[1],
                        image_url: cols[2],
                        logo_url: cols[3],
                        skirt_text: cols[4],
                        binder_page: cols[5]
                    };
                });
                
                populateCountries();
                displayCapsules(allCapsules);
            });

        // 2. Remplir le menu déroulant avec les pays uniques
        function populateCountries() {
            const select = document.getElementById('countrySelect');
            const countries = [...new Set(allCapsules.map(c => c.country))].sort();
            countries.forEach(country => {
                if(country) {
                    let opt = document.createElement('option');
                    opt.value = country;
                    opt.innerHTML = country;
                    select.appendChild(opt);
                }
            });
        }

        // 3. Afficher les capsules
        function displayCapsules(capsules) {
            const grid = document.getElementById('capsuleGrid');
            grid.innerHTML = '';
            capsules.forEach(c => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${c.image_url}" class="cap-img" onerror="this.src='https://via.placeholder.com/150?text=No+Image'">
                    <div class="info">
                        <strong>#${c.id}</strong><br>
                        ${c.country}<br>
                        <span class="skirt">${c.skirt_text || ''}</span>
                    </div>
                    <img src="${c.logo_url}" class="logo-img" onerror="this.style.display='none'">
                    <div class="info">Page: ${c.binder_page}</div>
                `;
                grid.appendChild(card);
            });
        }

        // 4. Filtrer par recherche ET par menu déroulant
        function filterData() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const selectedCountry = document.getElementById('countrySelect').value;

            const filtered = allCapsules.filter(c => {
                const matchSearch = c.id.toLowerCase().includes(searchTerm) || 
                                    (c.skirt_text && c.skirt_text.toLowerCase().includes(searchTerm));
                const matchCountry = selectedCountry === "" || c.country === selectedCountry;
                return matchSearch && matchCountry;
            });

            displayCapsules(filtered);
        }
    </script>
</body>
</html>
