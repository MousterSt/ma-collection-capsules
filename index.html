<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Collection de Capsules</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; text-align: center; margin:0; padding:0; }
        .header { background: white; padding: 15px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; padding: 15px; }
        
        /* Style fidèle à ton premier script qui marchait */
        .card { background: white; border-radius: 10px; padding: 10px; width: 160px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; }
        .cap-img { width: 130px; height: 130px; object-fit: contain; }
        .logo-img { width: 80px; height: 40px; object-fit: contain; margin-top: 5px; }
        .info { font-size: 0.85em; margin-top: 5px; }
        
        input, select { padding: 8px; border-radius: 5px; border: 1px solid #ccc; margin: 5px; }
        .hidden { display: none; } /* Pour cacher le verso au début */
    </style>
</head>
<body>

    <div class="header">
        <h1>Ma Collection 🍻</h1>
        <input type="text" id="searchInput" placeholder="Rechercher ID..." onkeyup="filterData()">
        <select id="countrySelect" onchange="filterData()">
            <option value="">Tous les pays</option>
        </select>
    </div>

    <div class="grid" id="capsuleGrid"></div>

    <script>
        let allCapsules = [];

        // Chargement identique à ta première version réussie
        fetch('capsules_local.csv')
            .then(res => res.text())
            .then(data => {
                const rows = data.split('\n').filter(r => r.trim() !== '');
                const headers = rows[0].split(','); // id, country, image_url, logo_url, skirt_text, binder_page

                allCapsules = rows.slice(1).map(row => {
                    const c = row.split(',');
                    return { id: c[0], country: c[1], img: c[2], logo: c[3], skirt: c[4], page: c[5] };
                });

                // Tri par ID pour que ce soit rangé
                allCapsules.sort((a, b) => parseInt(a.id) - parseInt(b.id));

                populateCountries();
                display(allCapsules);
            });

        function populateCountries() {
            const select = document.getElementById('countrySelect');
            const countries = [...new Set(allCapsules.map(c => c.country))].filter(x => x).sort();
            countries.forEach(country => {
                let opt = document.createElement('option');
                opt.value = country; opt.textContent = country;
                select.appendChild(opt);
            });
        }

        function display(capsules) {
            const grid = document.getElementById('capsuleGrid');
            grid.innerHTML = '';
            capsules.forEach(c => {
                const card = document.createElement('div');
                card.className = 'card';
                // Système de retournement simple au clic
                card.onclick = function() {
                    const front = this.querySelector('.front');
                    const back = this.querySelector('.back');
                    front.classList.toggle('hidden');
                    back.classList.toggle('hidden');
                };

                card.innerHTML = `
                    <div class="front">
                        <div style="font-weight:bold">#${c.id}</div>
                        <img src="${c.img}" class="cap-img">
                        <div class="info">${c.country}</div>
                    </div>
                    <div class="back hidden">
                        <img src="${c.logo}" class="logo-img" onerror="this.style.display='none'">
                        <div class="info" style="font-style:italic">${c.skirt || ''}</div>
                        <div class="info" style="margin-top:10px; color:blue">Page: ${c.page}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterData() {
            const txt = document.getElementById('searchInput').value.toLowerCase();
            const country = document.getElementById('countrySelect').value;
            const filtered = allCapsules.filter(c => {
                const matchTxt = c.id.includes(txt) || (c.skirt && c.skirt.toLowerCase().includes(txt));
                const matchCountry = country === "" || c.country === country;
                return matchTxt && matchCountry;
            });
            display(filtered);
        }
    </script>
</body>
</html>
