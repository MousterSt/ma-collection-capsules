    <style>

            text-align: center;

            transition: transform 0.2s;
        }
        .carte:hover { transform: translateY(-5px); }
        .img-capsule { 
            width: 120px; 
            height: 120px; 
            object-fit: contain; 
            border-radius: 50%; 
            background: #eee;
            margin-bottom: 10px;
        }
        .nom-capsule { 
            font-size: 0.9em; 
            font-weight: bold; 
            color: #333; 
            margin: 8px 0;
            height: 2.4em;
            overflow: hidden;
        }
        .img-logo { 
            width: 40px; 
            height: 40px; 
            object-fit: contain; 
            opacity: 0.8;
        }
    </style>
